research_summary: "As an AI researcher focused on accelerating scientific progress, I believe that scalable and impactful scientific systems equipped with autonomy are essential. I build these systems through a unified framework that integrates reasoning agents—grounded in scientific laws and equipped with truthful tools—with large-scale generative models acting as scientific world models. Crucially, operating this unified framework at a real-world-meaningful scale requires a seamless architecture driven by deep HPC and system-level CUDA optimizations. This synergy of agentic reasoning and high-performance optimization enables robust closed-loop exploration, ultimately paving the way for long-term visions like autonomous laboratories."

